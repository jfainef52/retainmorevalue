<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advisor Login — RetainMoreValue.com</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --navy: #0D1B2E; --navy-2: #152640;
  --gold: #C9A84C; --gold-lt: #DFC278; --gold-pale: #F7F0E0;
  --white: #FFFFFF; --off: #F5F3EE; --border: #DDD8CE;
  --muted: #8A8070; --red: #8B2020; --red-lt: #FDF0F0; --text: #1A1A2A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Background texture */
body::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(201,168,76,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.03) 1px, transparent 1px);
  background-size: 64px 64px;
}
body::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 50% 50% at 20% 20%, rgba(201,168,76,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(42,110,69,.04) 0%, transparent 55%);
}

.login-wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 400px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Logo */
.logo-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
}
.logo-block svg { display: block; margin-bottom: 14px; }
.logo-tag {
  font-size: 9px; letter-spacing: 3.5px; text-transform: uppercase;
  color: rgba(255,255,255,.3);
}

/* Card */
.login-card {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(201,168,76,.18);
  border-radius: 6px;
  overflow: hidden;
}
.card-hdr {
  background: var(--navy-2);
  border-bottom: 1px solid rgba(201,168,76,.12);
  padding: 20px 28px;
}
.card-hdr h1 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600;
  color: var(--white); letter-spacing: .3px;
}
.card-hdr p {
  font-size: 11px; color: rgba(255,255,255,.35);
  margin-top: 4px; letter-spacing: .3px;
}
.card-body { padding: 28px; }

.field { margin-bottom: 18px; }
.field:last-of-type { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,.4); margin-bottom: 7px;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 3px;
  color: var(--white);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  padding: 11px 14px;
  outline: none;
  transition: border-color .15s, background .15s;
}
.field input::placeholder { color: rgba(255,255,255,.2); }
.field input:focus {
  border-color: rgba(201,168,76,.5);
  background: rgba(201,168,76,.04);
}

.sep { height: 1px; background: rgba(255,255,255,.07); margin: 22px 0; }

.btn-sign-in {
  width: 100%;
  background: var(--gold); color: var(--navy); border: none;
  border-radius: 3px; padding: 13px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11.5px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: background .15s;
}
.btn-sign-in:hover { background: var(--gold-lt); }
.btn-sign-in:disabled { opacity: .5; cursor: default; }

.error-msg {
  display: none;
  background: var(--red-lt); border: 1px solid rgba(139,32,32,.25);
  color: var(--red); border-radius: 3px;
  padding: 10px 14px; font-size: 12px; line-height: 1.5;
  margin-top: 14px;
}
.error-msg.visible { display: block; }

.card-foot {
  padding: 16px 28px;
  border-top: 1px solid rgba(255,255,255,.06);
  text-align: center;
}
.card-foot a {
  font-size: 11px; color: rgba(255,255,255,.28);
  text-decoration: none; transition: color .15s;
  letter-spacing: .3px;
}
.card-foot a:hover { color: var(--gold); }

.back-link {
  margin-top: 24px;
  font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,.2); text-decoration: none;
  transition: color .15s;
}
.back-link:hover { color: rgba(255,255,255,.45); }

/* Spinner */
.spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid rgba(13,27,46,.3);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-sign-in.loading .btn-txt { display: none; }
.btn-sign-in.loading .spinner { display: block; }
</style>
</head>

  <div class="login-card">
    <div class="card-hdr">
      <h1>Advisor Login</h1>
      <p>RetainMoreValue.com · Internal Use Only</p>
    </div>
    <div class="card-body">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@yourfirm.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
      </div>
      <div class="sep"></div>
      <button class="btn-sign-in" id="sign-in-btn" onclick="handleSignIn()">
        <span class="btn-txt">Sign In</span>
        <div class="spinner"></div>
      </button>
      <div class="error-msg" id="error-msg"></div>
    </div>
    <div class="card-foot">
      <a href="mailto:support@enhancedFunding.com?subject=RetainMoreValue Access Request">Need access? Contact support@enhancedFunding.com</a>
    </div>
  </div>

  <a href="/" class="back-link">← RetainMoreValue.com</a>
</div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────────
// Replace these two values with your actual Supabase project credentials
const SUPABASE_URL  = 'https://fcuveztmmefgntoekqze.supabase.co';
const SUPABASE_ANON = 'sb_publishable_TACe4ULWiMWdz8NhkF1gNA_0PSjITAz';
// ────────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// If already logged in, go straight to the modeler
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'eta-modeler.html';
})();

// Handle Enter key
['email','password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSignIn();
  });
});

async function handleSignIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('sign-in-btn');
  const errBox   = document.getElementById('error-msg');

  errBox.classList.remove('visible');

  if (!email || !password) {
    showError('Please enter your email address and password.');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  const { error } = await sb.auth.signInWithPassword({ email, password });

  btn.classList.remove('loading');
  btn.disabled = false;

  if (error) {
    showError('Invalid email or password. Contact support@enhancedFunding.com if you need access.');
  } else {
    // Confirm session is actually set before redirecting
    var check = await sb.auth.getSession();
    if (check.data && check.data.session) {
      window.location.replace('eta-modeler.html');
    } else {
      // Fallback: wait and retry
      setTimeout(async function() {
        var retry = await sb.auth.getSession();
        if (retry.data && retry.data.session) {
          window.location.replace('eta-modeler.html');
        }
      }, 1000);
    }
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}
</script>
